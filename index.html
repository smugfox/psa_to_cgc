<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>PSA → CGC Crossovers</title>
<style>
  :root {
    --bg: #101014;
    --surface: #17171d;
    --surface-2: #1e1e26;
    --border: rgba(255, 255, 255, 0.08);
    --text: #e8e8ec;
    --text-dim: #9a9aa6;
    --gold: #d9b452;
    --psa-red: #e05252;

    --text-4-size: 31px; --text-4-lh: 40px; --text-4-tracking: 0.0006em;
    --text-3-size: 25px; --text-3-lh: 32px; --text-3-tracking: 0.0031em;
    --text-2-size: 20px; --text-2-lh: 28px; --text-2-tracking: 0.0035em;
    --text-1-size: 16px; --text-1-lh: 24px; --text-1-tracking: 0.0035em;
    --text-0-size: 13px; --text-0-lh: 20px;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 400 var(--text-1-size)/var(--text-1-lh) -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    letter-spacing: var(--text-1-tracking);
    padding: 48px 24px 96px;
  }
  main { max-width: 1040px; margin: 0 auto; }

  header { margin-bottom: 48px; }
  h1 {
    font-size: var(--text-4-size); line-height: var(--text-4-lh);
    letter-spacing: var(--text-4-tracking); font-weight: 650;
  }
  h1 .arrow { color: var(--gold); }
  .subtitle { color: var(--text-dim); margin-top: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 32px;
  }

  .card-head { display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: baseline; margin-bottom: 4px; }
  h2 { font-size: var(--text-3-size); line-height: var(--text-3-lh); letter-spacing: var(--text-3-tracking); font-weight: 600; }
  .card-meta { color: var(--text-dim); margin-bottom: 24px; }

  .badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge {
    font-size: var(--text-0-size); line-height: var(--text-0-lh);
    font-weight: 600; padding: 4px 12px; border-radius: 999px;
    border: 1px solid var(--border); white-space: nowrap;
  }
  .badge-psa { color: var(--psa-red); border-color: rgba(224, 82, 82, 0.35); }
  .badge-cgc { color: var(--gold); border-color: rgba(217, 180, 82, 0.4); }
  .badge-top { background: var(--gold); color: #1a1508; border-color: var(--gold); }

  .scans { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .scan { display: block; border-radius: 12px; overflow: hidden; background: var(--surface-2); border: 1px solid var(--border); }
  .scan img { display: block; width: 100%; height: auto; }
  .scan figcaption {
    padding: 8px 12px; font-size: var(--text-0-size); line-height: var(--text-0-lh);
    color: var(--text-dim); display: flex; justify-content: space-between; gap: 8px;
  }
  .scan a { color: var(--text-dim); }
  .scan a:hover { color: var(--text); }

  .facts { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
  .fact-block {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .fact-block h3 {
    font-size: var(--text-0-size); line-height: var(--text-0-lh);
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-dim); font-weight: 600; margin-bottom: 8px;
  }
  .fact-block ul { list-style: none; padding: 0; }
  .fact-block li { display: flex; justify-content: space-between; gap: 16px; padding: 2px 0; }
  .fact-block li span:first-child { color: var(--text-dim); }
  .fact-block a.cert-link { color: var(--gold); text-decoration: none; }
  .fact-block a.cert-link:hover { text-decoration: underline; }

  footer { color: var(--text-dim); font-size: var(--text-0-size); line-height: var(--text-0-lh); text-align: center; margin-top: 48px; }

  @media (max-width: 640px) {
    body { padding: 32px 16px 64px; }
    .card { padding: 16px; }
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>PSA <span class="arrow">→</span> CGC Crossovers</h1>
    <p class="subtitle">Reference library of cards that crossed from PSA slabs to CGC Pristine 10 — for spotting undergraded copies on eBay.</p>
  </header>
  <div id="cards"></div>
  <footer id="footer"></footer>
</main>
<script>
  const esc = s => String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  // On Vercel, load data + scans straight from the GitHub repo so pushes go live without a redeploy
  const local = ['localhost', '127.0.0.1'].includes(location.hostname);
  const BASE = local ? '' : 'https://raw.githubusercontent.com/smugfox/psa_to_cgc/main/';

  fetch(BASE + 'cards.json')
    .then(r => r.json())
    .then(({ cards, updated }) => {
      document.getElementById('cards').innerHTML = cards.map(c => {
        const scans = [
          { label: `PSA ${esc(c.psa.grade)} · front`, src: `${BASE}${c.folder}/psa-${c.psa.cert}-front.jpg` },
          { label: `PSA ${esc(c.psa.grade)} · back`, src: `${BASE}${c.folder}/psa-${c.psa.cert}-back.jpg` },
          { label: `CGC ${esc(c.cgc.grade)} · front`, src: `${BASE}${c.folder}/cgc-${c.cgc.cert}-front.jpg` },
          { label: `CGC ${esc(c.cgc.grade)} · back`, src: `${BASE}${c.folder}/cgc-${c.cgc.cert}-back.jpg` },
        ];
        return `
        <article class="card">
          <div class="card-head">
            <h2>${esc(c.name)}</h2>
            <div class="badges">
              <span class="badge badge-psa">PSA ${esc(c.psa.grade)}</span>
              <span class="badge badge-cgc">CGC ${esc(c.cgc.grade)}</span>
              ${c.cgc.topPop ? '<span class="badge badge-top">TOP POP</span>' : ''}
            </div>
          </div>
          <p class="card-meta">${esc(c.set)} · #${esc(c.number)} · ${esc(c.variant)} · ${c.year}</p>
          <div class="scans">
            ${scans.map(s => `
              <figure class="scan">
                <a href="${s.src}" target="_blank" rel="noopener"><img src="${s.src}" alt="${esc(c.name)} — ${s.label} scan" loading="lazy"></a>
                <figcaption><span>${s.label}</span><a href="${s.src}" target="_blank" rel="noopener">full res</a></figcaption>
              </figure>`).join('')}
          </div>
          <div class="facts">
            <div class="fact-block">
              <h3>Certs</h3>
              <ul>
                <li><span>PSA #${esc(c.psa.cert)}</span><a class="cert-link" href="${esc(c.psa.url)}" target="_blank" rel="noopener">verify ↗</a></li>
                <li><span>CGC #${esc(c.cgc.cert)}</span><a class="cert-link" href="${esc(c.cgc.url)}" target="_blank" rel="noopener">verify ↗</a></li>
              </ul>
            </div>
            <div class="fact-block">
              <h3>Population</h3>
              <ul>
                <li><span>PSA ${esc(c.psa.grade)}</span><span>${c.psa.pop} (${c.psa.higher} higher)</span></li>
                <li><span>CGC ${esc(c.cgc.grade)}</span><span>${c.cgc.pop} (${c.cgc.higher} higher)</span></li>
                <li><span>PSA estimate</span><span>${esc(c.psa.estimate)}</span></li>
              </ul>
            </div>
            <div class="fact-block">
              <h3>Recent PSA sales</h3>
              <ul>${c.sales.map(s => `<li><span>${esc(s.date)} · ${esc(s.venue)}</span><span>${esc(s.price)}</span></li>`).join('')}</ul>
            </div>
          </div>
        </article>`;
      }).join('');
      document.getElementById('footer').textContent = `${cards.length} card${cards.length === 1 ? '' : 's'} · updated ${updated} · personal reference, not affiliated with PSA or CGC`;
    })
    .catch(() => {
      document.getElementById('cards').innerHTML = '<p class="subtitle">Could not load cards.json.</p>';
    });
</script>
</body>
</html>
